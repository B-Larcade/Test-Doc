<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="servers.css">
    <title>Discord mimic</title>
</head>

<body>
    <div class="header-nav">
        <div id="header-text"><img src="img/discord-header.png" alt="Logo" width="20" height="20">KHSMP</div>
        <div id="header-link">
            <a href="#">
                <img src="img/last-meadow.png" alt="HM" width="17" height="17">
            </a>
            <a href="#">
                <img src="img/inbox.png" alt="IN" width="20" height="20">
            </a>
            <a href="#">
                <img src="img/help.png" alt="HP" width="20" height="20">
            </a>
        </div>
    </div>
    <div class="icon-list">
        <ul>
            <li class="icon"><img src="img/discord-header.png" alt="Logo" width="30" height="30"></li>
            <div id="holder"><span class="server-seprater"></span></div>
            <li class="icon">B</li>
            <li class="icon">C</li>
            <li class="icon">D</li>
        </ul>
    </div>
    <div class="main-content">
        <div id="direct-message">
            <div id="friends-sidebar" class="sidebar"></div>
            <div id="dm-nav" class="navigation-bar"></div>
            <div id="friends-list" class="content-space"></div>
            <div id="active-now"></div>
        </div>
        <div id="within-server">
            <div id="" class="sidebar server-sidebar-head">server-sidebar-head</div>
            <div id="" class="sidebar server-sidebar">
                <div class="sidebar-list-items">
                    <div class="sidebar-container"><a class="sidebar-item">
                            <img class="img-unactive" src="img/members.png" width="25px" height="25px">
                            <img class="img-active" src="img/members-active.png" width="25px" height="25px">
                            &nbsp;Members</a>
                    </div>
                    <div id="holder"><span class="server-seprater"></span></div>
                    <div class="sidebar-container"><a class="sidebar-item">
                            <img class="img-unactive" src="img/hashtag.svg" width="25px" height="25px">
                            <img class="img-active" src="img/hashtag-active.svg" width="25px"
                                height="25px">&nbsp;Annoucements</a></div>
                    <div class="sidebar-container"><a class="sidebar-item">
                            <img class="img-unactive" class="img-unactive" src="img/hashtag.svg" width="25px"
                                height="25px">
                            <img class="img-active" src="img/hashtag-active.svg" width="25px"
                                height="25px">&nbsp;Rules</a>
                    </div>
                    <div class="sidebar-container active"><a class="sidebar-item">
                            <img class="img-unactive" src="img/hashtag.svg" width="25px" height="25px">
                            <img class="img-active" src="img/hashtag-active.svg" width="25px"
                                height="25px">&nbsp;General</a>
                    </div>
                </div>
            </div>
            <div id="" class="navigation-bar server-nav">server-nav</div>
            <div id="" class="content-space server-content">server-content</div>
        </div>
    </div>
    <div class="profile">KickStart Studios</div>

    <script src="script.js"></script>
</body>

</html>
